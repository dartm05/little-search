version: '3.8'

services:
  # ============================================
  # Redis - Message Broker & Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: littlesearch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - littlesearch-network
    restart: unless-stopped

  # ============================================
  # Qdrant - Vector Database
  # ============================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: littlesearch-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - littlesearch-network
    restart: unless-stopped

  # ============================================
  # FastAPI - API Coordinator
  # ============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: littlesearch-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - embedding_cache:/app/cache/models
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - EMBEDDING_CACHE_DIR=/app/cache/models
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - littlesearch-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================
  # Celery Worker 1 - Document Chunking
  # ============================================
  worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: littlesearch-worker-1
    volumes:
      - ./backend:/app
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - WORKER_QUEUE=chunking
    depends_on:
      - redis
      - qdrant
    networks:
      - littlesearch-network
    restart: unless-stopped
    command: celery -A infrastructure.messaging.celery_app worker -Q chunking -n worker1@%h --loglevel=info --concurrency=2

  # ============================================
  # Celery Worker 2 - Embedding Generation
  # ============================================
  worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: littlesearch-worker-2
    volumes:
      - ./backend:/app
      - embedding_cache:/app/cache/models
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - EMBEDDING_CACHE_DIR=/app/cache/models
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
      - WORKER_QUEUE=embedding
    depends_on:
      - redis
      - qdrant
    networks:
      - littlesearch-network
    restart: unless-stopped
    # For GPU support, uncomment below and ensure NVIDIA Docker runtime is installed
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    command: celery -A infrastructure.messaging.celery_app worker -Q embedding -n worker2@%h --loglevel=info --concurrency=1

  # ============================================
  # Celery Worker 3 - Vector Indexing
  # ============================================
  worker-3:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: littlesearch-worker-3
    volumes:
      - ./backend:/app
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - WORKER_QUEUE=indexing
    depends_on:
      - redis
      - qdrant
    networks:
      - littlesearch-network
    restart: unless-stopped
    command: celery -A infrastructure.messaging.celery_app worker -Q indexing -n worker3@%h --loglevel=info --concurrency=2

  # ============================================
  # Flower - Celery Task Monitoring
  # ============================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: littlesearch-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - FLOWER_PORT=5555
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:admin}
    depends_on:
      - redis
    networks:
      - littlesearch-network
    restart: unless-stopped
    command: celery -A infrastructure.messaging.celery_app flower --port=5555

  # ============================================
  # React Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: littlesearch-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
      - VITE_WS_URL=ws://localhost:8000/ws
    depends_on:
      - api
    networks:
      - littlesearch-network
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 3000

  # ============================================
  # Ollama - Local LLM (Optional)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: littlesearch-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - littlesearch-network
    restart: unless-stopped
    profiles:
      - llm
    # For GPU support, uncomment below
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

# ============================================
# Volumes
# ============================================
volumes:
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  embedding_cache:
    driver: local
  ollama_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  littlesearch-network:
    driver: bridge
